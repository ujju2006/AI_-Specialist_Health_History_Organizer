name: Health History Organizer CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential sqlite3

    - name: Install Python Package Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Test Suite Execution
      env:
        SECRET_KEY: test_secret_token_12345
        ALGORITHM: HS256
        DATABASE_URL: sqlite:///./test_health.db
      run: |
        cd backend
        python -m pytest tests/ -v
